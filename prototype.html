<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#ff7a59" />
<meta name="description" content="주호·주아의 하루 미션 - 매일 미션을 체크하고 부모와 소통하는 가족 미션 앱" />
<link rel="manifest" href="manifest.webmanifest" />
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="apple-touch-icon" href="navicons/appicon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="가족미션" />
<title>우리가족 미션 챌린지 · 주호·주아의 하루 미션</title>
<style>
/* ===== 로컬 폰트 (font/ 폴더) ===== */
@font-face{font-family:'Gmarket';src:url('font/GmarketSansTTFMedium.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'Gmarket';src:url('font/GmarketSansTTFBold.ttf') format('truetype');font-weight:700;font-display:swap}
@font-face{font-family:'Paperlogy';src:url('font/Paperlogy-8ExtraBold.ttf') format('truetype');font-weight:800;font-display:swap}
@font-face{font-family:'PretendardL';src:url('font/Pretendard-Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'PretendardL';src:url('font/Pretendard-Bold.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'NanumSquareL';src:url('font/NanumSquareR.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'NanumSquareL';src:url('font/NanumSquareB.otf') format('opentype');font-weight:700;font-display:swap}
:root{
  --primary:#ff7a59;--primary-2:#ff9478;--primary-deep:#e85c3d;
  --hero1:#ffb391;--hero2:#ff7a59;
  --bg:#fff7ef;--card:#fff;--ink:#3e2a20;--ink-soft:#a08a7a;--line:#f1e6d8;
  --coin:#ffb84d;--coin-deep:#e8963a;--ok:#2fb37a;--danger:#ff5a5a;
  --juho:#4e86c6;--jua:#8e7cd1;
  --faith:#b08a1e;--faith-bg:#fff3d1;--read:#3e8a57;--read-bg:#e6f4ea;
  --study:#3d6fa8;--study-bg:#e3f0fa;--life:#6f5bb5;--life-bg:#f1edfa;
  --radius:22px;--shadow:0 6px 20px rgba(160,90,60,.12);--shadow-sm:0 3px 12px rgba(160,90,60,.10);
  --ft:'Gmarket','Malgun Gothic',system-ui,sans-serif;      /* 메인 타이틀 */
  --ft2:'Paperlogy','Malgun Gothic',system-ui,sans-serif;   /* 그다음 타이틀 */
  --fb:'PretendardL','Malgun Gothic',system-ui,sans-serif;  /* 본문 (Bold/Medium) */
  --fe:'NanumSquareL','Malgun Gothic',system-ui,sans-serif; /* 그외 */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;font-family:var(--fb);font-weight:500;color:var(--ink)}
body{background:linear-gradient(160deg,#ffe3cf,#ffccb0 60%,#ffb59a);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
img{max-width:100%}
.stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:22px 10px}
.phone{width:390px;max-width:100%;height:844px;max-height:calc(100vh - 90px);background:var(--bg);border-radius:46px;border:12px solid #171a2b;box-shadow:0 30px 70px rgba(0,0,0,.35);overflow:hidden;position:relative;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#171a2b;border-radius:0 0 18px 18px;z-index:60}
.screen-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;padding-top:36px}
@media(max-width:480px){
  body{background:var(--bg)}.stage{padding:0;gap:0}
  .phone{width:100%;height:100vh;height:100dvh;max-height:none;border:none;border-radius:0;box-shadow:none}
  .notch,.role-toggle{display:none!important}
  .screen-wrap{padding-top:env(safe-area-inset-top)}
}
#app{flex:1;min-height:0;display:flex;flex-direction:column}
.screen{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
.body::-webkit-scrollbar{width:0}
.pad{padding:16px}
.appbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.appbar .name{font-family:var(--ft);font-weight:700;font-size:18px;letter-spacing:-0.3px;color:var(--ink);white-space:nowrap;flex:0 0 auto}
.sp{flex:1}
.coinpill{display:inline-flex;align-items:center;gap:5px;background:#fff;border-radius:999px;padding:6px 12px;font-family:var(--fe);font-weight:700;font-size:13px;box-shadow:var(--shadow-sm);color:var(--coin-deep)}
.iconbtn{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:18px;background:#fff;box-shadow:var(--shadow-sm);color:var(--ink);position:relative}
.iconbtn.plain{background:transparent;box-shadow:none}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fe);font-weight:700;font-size:17px;padding:15px 20px;border-radius:16px;background:linear-gradient(180deg,var(--primary-2),var(--primary));color:#fff;box-shadow:0 5px 0 var(--primary-deep);width:100%;transition:transform .06s,box-shadow .06s}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--primary-deep)}
.btn.coin{background:linear-gradient(180deg,#ffce5e,#f5b93e);box-shadow:0 5px 0 var(--coin-deep);color:#7a5210}
.btn.ghost{background:#fff;color:var(--primary);box-shadow:0 0 0 2px #f0e5d6 inset}
.btn.sm{font-size:14px;padding:9px 14px;border-radius:12px;width:auto;box-shadow:0 3px 0 var(--primary-deep)}
.btn.sm:active{box-shadow:0 1px 0 var(--primary-deep)}
.btn:disabled{opacity:.5;box-shadow:none;cursor:not-allowed;filter:grayscale(.3)}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--fe);font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:#f6ece0;color:var(--ink-soft)}
.dot{min-width:19px;height:19px;padding:0 6px;border-radius:999px;background:var(--danger);color:#fff;font-family:var(--fe);font-size:11px;font-weight:700;display:inline-grid;place-items:center}
.sect{font-family:var(--ft2);font-weight:800;font-size:16px;color:var(--ink);margin:20px 4px 10px;display:flex;align-items:center;gap:8px}
.sect .more{margin-left:auto;font-family:var(--fb);font-size:12px;font-weight:700;color:var(--ink-soft)}
.muted{color:var(--ink-soft)}
.inp{width:100%;border:1.5px solid #e8dcc9;border-radius:12px;padding:11px 13px;font-size:14px;outline:none;background:#fffdf8}
.inp:focus{border-color:var(--primary-2)}
/* 캐릭터 */
.charcircle{border-radius:16px;overflow:hidden;background:#eef1fb;flex:0 0 auto;display:block}
.herosvg{display:block}
/* 상태 원 */
.stcircle{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:19px;flex:0 0 auto;font-weight:800}
/* 하단 탭 */
.bottomnav{display:flex;background:#fff;border-top:1px solid #f1e6d8;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--ink-soft);font-family:var(--fe);font-size:11px;font-weight:700}
.bottomnav button.active{color:var(--primary)}
.bottomnav .ico{font-size:20px;position:relative;line-height:0}
.navimg{width:27px;height:27px;display:block;object-fit:contain;opacity:.5;transition:opacity .15s,transform .15s}
.bottomnav button.active .navimg{opacity:1;transform:scale(1.08)}
.toggleimg{width:20px;height:20px;border-radius:50%;object-fit:cover;display:inline-block;vertical-align:middle;margin-right:5px}
/* 역할 토글 */
.role-toggle{display:inline-flex;background:rgba(255,255,255,.65);border-radius:999px;padding:5px;gap:4px;backdrop-filter:blur(4px)}
.role-toggle button{font-family:var(--fe);font-weight:700;font-size:14px;padding:8px 18px;border-radius:999px;color:var(--primary-deep)}
.role-toggle button.active{background:var(--primary);color:#fff}
/* 진행 게이지 바 */
.pbar{height:12px;background:#f0e5d6;border-radius:999px;overflow:hidden}
.pbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary-2),var(--primary));transition:width .5s}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes stickerpop{0%{transform:translate(-50%,-50%) scale(.2) rotate(-15deg);opacity:0}30%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(8deg)}70%{transform:translate(-50%,-50%) scale(1) rotate(-3deg);opacity:1}100%{transform:translate(-50%,-72%) scale(1) rotate(0);opacity:0}}
.stickerburst{position:absolute;left:50%;top:46%;font-size:104px;z-index:96;pointer-events:none;filter:drop-shadow(0 8px 14px rgba(0,0,0,.18));animation:stickerpop 1.15s ease forwards}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
.pop{animation:pop .3s ease both}.slideup{animation:slideup .25s ease both}.floaty{animation:floaty 3.4s ease-in-out infinite}
.toast-wrap{position:absolute;left:0;right:0;bottom:86px;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;z-index:80}
.toast{background:#2b2f45;color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:var(--shadow);animation:slideup .25s ease both;max-width:86%;text-align:center}
#fx{position:absolute;inset:0;pointer-events:none;z-index:90}
.sheet-bg{position:absolute;inset:0;background:rgba(30,34,60,.4);z-index:95;display:flex;align-items:flex-end}
.sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:18px;max-height:88%;overflow-y:auto}
.locked{filter:grayscale(1) opacity(.45)}
</style>
</head>
<body>
<div class="stage">
  <div class="role-toggle" id="roleToggle"></div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen-wrap">
      <div id="app"></div>
      <div class="toast-wrap" id="toasts"></div>
      <canvas id="fx"></canvas>
      <div id="overlay"></div>
    </div>
  </div>
</div>

var WEEK=['일','월','화','수','목','금','토'];
function pad(n){return String(n).padStart(2,'0')}
function toKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseKey(k){var a=k.split('-').map(Number);return new Date(a[0],a[1]-1,a[2])}
function todayKey(){return toKey(new Date())}
function labelKo(k){var d=parseKey(k);return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WEEK[d.getDay()]+')'}
function shortLabel(k){var d=parseKey(k);return (d.getMonth()+1)+'.'+d.getDate()}
function weekdayKo(k){return WEEK[parseKey(k).getDay()]}
function addDays(k,n){var d=parseKey(k);d.setDate(d.getDate()+n);return toKey(d)}
function lastNDays(k,n){var o=[];for(var i=n-1;i>=0;i--)o.push(addDays(k,-i));return o}
function monthGrid(k){var d=parseKey(k),y=d.getFullYear(),m=d.getMonth();var first=new Date(y,m,1);var dim=new Date(y,m+1,0).getDate();var c=[];for(var i=0;i<first.getDay();i++)c.push(null);for(var day=1;day<=dim;day++)c.push(toKey(new Date(y,m,day)));return c}

function statusOf(c,d,m){var r=S.records[c+'|'+d+'|'+m];return r?r.status:'none'}
function commentOf(c,d,m){var r=S.records[c+'|'+d+'|'+m];return r?r.comment:undefined}
function dayStats(c,d){var ms=missionsOf(c),ch=0,se=0,ap=0;ms.forEach(function(m){var s=statusOf(c,d,m.id);if(s==='checked')ch++;else if(s==='sent')se++;else if(s==='approved')ap++});var t=ms.length;return{total:t,checked:ch,sent:se,approved:ap,done:ch+se+ap,rate:t?Math.round(ap/t*100):0,progress:t?Math.round((ch+se+ap)/t*100):0}}
function pendingCount(c,d){return missionsOf(c).filter(function(m){return statusOf(c,d,m.id)==='sent'}).length}
function totalPending(d){return S.children.reduce(function(s,c){return s+pendingCount(c.id,d)},0)}
function trend(c,d,n){return lastNDays(d,n).map(function(x){return{date:x,rate:dayStats(c,x).rate}})}
function streak(c,d){var n=0,cur=d;if(dayStats(c,cur).rate<60)cur=addDays(cur,-1);for(var i=0;i<60;i++){if(dayStats(c,cur).rate>=60){n++;cur=addDays(cur,-1)}else break}return n}
function daysWithPending(c){var set={};Object.keys(S.records).forEach(function(k){var p=k.split('|');if(p[0]===c&&S.records[k].status==='sent')set[p[1]]=1});return Object.keys(set).sort().reverse()}
function messagesOf(c){return S.messages.filter(function(m){return m.childId===c}).sort(function(a,b){return a.ts-b.ts})}
function feedbackCount(c){return messagesOf(c).filter(function(m){return m.from==='parent'}).length}
/* 코인: 미션을 체크(클릭)하는 순간 100코인 적립 (체크/전송/승인 상태 모두 집계) */
var COUNTED={checked:1,sent:1,approved:1};
function coinsByCat(cid){var o={'신앙':0,'독서':0,'학습':0,'생활':0};Object.keys(S.records).forEach(function(k){var p=k.split('|');if(p[0]===cid&&COUNTED[S.records[k].status]){var m=S.missions.filter(function(x){return x.id===p[2]})[0];if(m)o[m.category]+=mCoin(m)}});return o}
function coinsEarned(cid){var o=coinsByCat(cid);return o['신앙']+o['독서']+o['학습']+o['생활']}

function cashReqs(cid){return (S.cashRequests||[]).filter(function(r){return r.childId===cid})}
function cashApprovedWon(cid){return cashReqs(cid).filter(function(r){return r.status==='approved'}).reduce(function(s,r){return s+r.won},0)}
function cashPendingWon(cid){return cashReqs(cid).filter(function(r){return r.status==='requested'}).reduce(function(s,r){return s+r.won},0)}
function cashBalance(cid){return Math.max(0,coinsEarned(cid)-cashApprovedWon(cid))}
function cashRequestable(cid){return Math.max(0,coinsEarned(cid)-cashApprovedWon(cid)-cashPendingWon(cid))}
function cashByYear(cid){var o={};cashReqs(cid).filter(function(r){return r.status==='approved'}).forEach(function(r){var y=new Date(r.ts).getFullYear();o[y]=(o[y]||0)+r.won});return o}
function childCashPending(cid){return cashReqs(cid).filter(function(r){return r.status==='requested'}).length}
function addCashRequest(cid,won){S.cashRequests=S.cashRequests||[];S.cashRequests.push({id:'cr'+Date.now()+Math.round(Math.random()*999),childId:cid,won:won,coins:won,status:'requested',ts:Date.now()});persist()}
function approveCashRequest(id){var r=(S.cashRequests||[]).filter(function(x){return x.id===id})[0];if(r)r.status='approved';persist()}
function childMsgCount(cid){return messagesOf(cid).filter(function(m){return m.from==='child'}).length}
function totalApproved(cid){return Object.keys(S.records).filter(function(k){var p=k.split('|');return p[0]===cid&&S.records[k].status==='approved'}).length}
function weekAvg(cid){var t=trend(cid,todayKey(),7);return t.length?Math.round(t.reduce(function(s,x){return s+x.rate},0)/t.length):0}
function tier(avg){return avg>=80?{n:'골드',c:'#F5B93E',i:'🥇'}:avg>=50?{n:'실버',c:'#AEB6C6',i:'🥈'}:{n:'브론즈',c:'#C58B5A',i:'🥉'}}
function sceneUnlocked(cid,sid){
  if(sid==='done')return lastNDays(todayKey(),30).some(function(d){var s=dayStats(cid,d);return s.total>0&&s.rate===100});

}

function setStatus(c,d,m,st,cm){var k=c+'|'+d+'|'+m;if(st==='none')delete S.records[k];else S.records[k]={status:st,comment:cm!==undefined?cm:(S.records[k]||{}).comment};persist()}
function toggleCheck(c,d,m){var k=c+'|'+d+'|'+m,cur=(S.records[k]||{}).status||'none';if(cur==='sent'||cur==='approved')return;if(cur==='checked'||cur==='rejected')delete S.records[k];else S.records[k]={status:'checked'};persist()}
function sendMissions(c,d){var n=0;missionsOf(c).forEach(function(m){var k=c+'|'+d+'|'+m.id;if((S.records[k]||{}).status==='checked'){S.records[k].status='sent';n++}});persist();return n}
function approveAll(c,d){missionsOf(c).forEach(function(m){var k=c+'|'+d+'|'+m.id;if((S.records[k]||{}).status==='sent')S.records[k].status='approved'});persist()}

function addMission(m){var sib=S.missions.filter(function(x){return x.childId===m.childId});var order=sib.length?Math.max.apply(null,sib.map(function(x){return x.order}))+1:0;m.id=m.childId+'-c'+Date.now();m.order=order;S.missions.push(m);persist()}
function updateMission(id,p){var m=S.missions.filter(function(x){return x.id===id})[0];if(m)Object.keys(p).forEach(function(k){m[k]=p[k]});persist()}
function deleteMission(id){S.missions=S.missions.filter(function(m){return m.id!==id});Object.keys(S.records).forEach(function(k){if(k.split('|')[2]===id)delete S.records[k]});persist()}
function moveMission(id,dir){var t=S.missions.filter(function(m){return m.id===id})[0];if(!t)return;var sib=S.missions.filter(function(m){return m.childId===t.childId}).sort(function(a,b){return a.order-b.order});var i=sib.findIndex(function(m){return m.id===id});var sw=sib[i+dir];if(!sw)return;var a=t.order;t.order=sw.order;sw.order=a;persist()}
/* #11 드래그로 미션 순서 재배치 */
function reorderTo(dragId,targetId){var dm=S.missions.filter(function(x){return x.id===dragId})[0];var tm=S.missions.filter(function(x){return x.id===targetId})[0];if(!dm||!tm||dm.childId!==tm.childId||dragId===targetId)return;var ids=S.missions.filter(function(m){return m.childId===dm.childId}).sort(function(a,b){return a.order-b.order}).map(function(m){return m.id});ids.splice(ids.indexOf(dragId),1);ids.splice(ids.indexOf(targetId),0,dragId);ids.forEach(function(id,idx){var m=S.missions.filter(function(x){return x.id===id})[0];if(m)m.order=idx});persist()}

function fxParts(build){var cv=document.getElementById('fx');var wrap=cv.parentElement.getBoundingClientRect();cv.width=wrap.width;cv.height=wrap.height;var ctx=cv.getContext('2d');var parts=build(cv);var t=0;(function frame(){ctx.clearRect(0,0,cv.width,cv.height);t++;parts.forEach(function(p){p.step(p)});parts.forEach(function(p){p.draw(ctx,p)});parts=parts.filter(function(p){return p.life>0});if(parts.length&&t<200)requestAnimationFrame(frame);else ctx.clearRect(0,0,cv.width,cv.height)})()}
function celebrate(){fxParts(function(cv){var cols=['#5C6BE0','#F5B93E','#7D8BF0','#2FB37A','#FF6B6B','#8E7CD1'];var arr=[];[.3,.5,.7].forEach(function(px){for(var i=0;i<40;i++){var a=Math.random()*Math.PI-Math.PI/2;var sp=6+Math.random()*7;arr.push({x:cv.width*px,y:cv.height*.7,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-6,c:cols[i%cols.length],s:5+Math.random()*4,r:Math.random()*6,life:70,step:function(p){p.vy+=.28;p.x+=p.vx;p.y+=p.vy;p.life--;p.r+=.2},draw:function(ctx,p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=Math.max(0,p.life/70);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore()}})}});return arr})}
function sparkle(){fxParts(function(cv){var arr=[];for(var i=0;i<22;i++){var a=Math.random()*Math.PI*2;var sp=2+Math.random()*4;arr.push({x:cv.width/2,y:cv.height*.45,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:42,step:function(p){p.x+=p.vx;p.y+=p.vy;p.life--},draw:function(ctx,p){ctx.globalAlpha=Math.max(0,p.life/42);ctx.fillStyle='#F5B93E';ctx.beginPath();ctx.arc(p.x,p.y,3,0,7);ctx.fill()}})}return arr})}

/* ============ 렌더러 ============ */
var lastRenderRoute=null;
function render(){var r=route();var parts=r.split('/').filter(Boolean);var html='';
  var pb=document.querySelector('.body');var prevScroll=pb?pb.scrollTop:0;
  if(parts[0]==='child'){
    if(parts.length===1)html=scChildSelect();
    else{var cid=parts[1],scr=parts[2];html=scr==='calendar'?scChildCalendar(cid):scr==='quest'?scChildQuest(cid):scr==='chat'?scChildChat(cid):scChildHome(cid)}
  }else if(parts[0]==='parent'){
    if(parts[1]==='login')html=scLogin();
    else if(parts[1]==='pinchange')html=scPinChange();
    else if(!authed){go('/parent/login');return}
    else if(!parts[1]||parts[1]==='select')html=scParentSelect();
    else if(parts[1]==='settings')html=scSettings();
    else if(!child(parts[1])){go('/parent/select');return}
    else{var pc=parts[1],ps=parts[2];html=ps==='approve'?scApprove(pc):ps==='missions'?scMissions(pc):ps==='chat'?scParentChat(pc):scDashboard(pc)}
  }else{go('/child');return}
  var sameScreen=(r===lastRenderRoute);lastRenderRoute=r;
  app.innerHTML=html;renderRoleToggle();
  var cb=document.getElementById('chatBody');
  if(cb){cb.scrollTop=cb.scrollHeight;}
  else{var nb=document.querySelector('.body');if(nb)nb.scrollTop=sameScreen?prevScroll:0;}
}
function renderRoleToggle(){var rt=document.getElementById('roleToggle');var isP=route().indexOf('/parent')===0;rt.innerHTML='<button class="'+(!isP?'active':'')+'" data-role="child"><img class="toggleimg" src="navicons/toggle-child.png" alt="">자녀</button><button class="'+(isP?'active':'')+'" data-role="parent"><img class="toggleimg" src="navicons/toggle-parent.png" alt="">부모</button>'}

/* ============ 이벤트 ============ */
document.addEventListener('click',function(e){
  if(e.target.classList&&e.target.classList.contains('sheet-bg')&&e.target.id==='modalbg'){closeModal();return}
  var sel='[data-go],[data-pick],[data-check],[data-send],[data-role],[data-login],[data-logout],[data-cal],[data-day],[data-range],[data-adate],[data-approve],[data-reject],[data-approveall],[data-cmt],[data-new],[data-edit],[data-del],[data-move],[data-reset],[data-sheetclose],[data-submit],[data-fcat],[data-fcycle],[data-sticker],[data-openmodal],[data-closemodal],[data-unit],[data-cashreq],[data-cashapprove],[data-attweek],[data-coinstep],[data-attday],[data-pinlogin],[data-pinsave],[data-synccode]';
  var t=e.target.closest(sel);if(!t)return;var ds=t.dataset;
  if(ds.openmodal){openModal(ds.openmodal, route().split('/')[2]);return}
  if(ds.closemodal){closeModal();return}

  if(ds.cashreq){var uu=modal?modal.units:1;addCashRequest(ds.cashreq,uu*CASH_UNIT);closeModal();toast(uu+'만원 현금전환을 부모님께 요청했어요 💸');render();return}
  if(ds.cashapprove){approveCashRequest(ds.cashapprove);sparkle();toast('현금전환을 승인했어요. 캐쉬에서 차감됩니다 💰');renderOverlay();render();return}
  if(ds.synccode){if(ds.synccode==='__clear__'){setFamilyCode('');toast('가족 동기화를 껐어요 (이 기기는 로컬 저장)');closeModal();render();return}var fc=(document.getElementById('famCode')||{}).value||'';fc=fc.trim();if(fc.length<4){toast('4자 이상으로 정해주세요');return}setFamilyCode(fc);toast('가족 코드를 저장했어요 🔒 같은 코드를 다른 기기에도 입력하세요');closeModal();render();return}
  if(ds.go){modal=null;renderOverlay();go(ds.go);return}
  if(ds.pick){modal=null;renderOverlay();attWeekOffset=0;S.lastChild=ds.pick;persist();go('/child/'+ds.pick+'/home');return}
  if(ds.role){modal=null;renderOverlay();if(ds.role==='child')go(S.lastChild?'/child/'+S.lastChild+'/home':'/child');else go('/parent');return}
  if(ds.pinlogin){var pv=(document.getElementById('pinInput')||{}).value||'';if(pv!==getPin()){toast('비밀번호가 올바르지 않아요');return}if(!isPinChanged()){go('/parent/pinchange');return}authed=true;localStorage.setItem('hfm_html_auth','1');go('/parent/select');return}
  if(ds.pinsave){var np=(document.getElementById('pinNew')||{}).value||'';var np2=(document.getElementById('pinNew2')||{}).value||'';if(!/^[0-9]{3,}$/.test(np)){toast('숫자 3자리 이상으로 입력해주세요');return}if(np!==np2){toast('두 비밀번호가 일치하지 않아요');return}if(np==='111'){toast('초기 비밀번호(111)와 다른 값으로 설정해주세요');return}S.parentPin=np;S.pinChanged=true;persist();authed=true;localStorage.setItem('hfm_html_auth','1');toast('비밀번호를 변경했어요 🔐');go('/parent/select');return}
  if(ds.logout){modal=null;renderOverlay();authed=false;localStorage.removeItem('hfm_html_auth');go('/parent/login');return}
  var cid=route().split('/')[2];
  if(ds.attweek){attWeekOffset+=Number(ds.attweek);render();return}
  if(ds.attday){calState={cid:cid,cursor:ds.attday,selected:ds.attday};go('/child/'+cid+'/calendar');return}
  if(ds.check){toggleCheck(cid,todayKey(),ds.check);render();return}
  if(ds.send){var n=sendMissions(ds.send,todayKey());if(n>0){celebrate();var pr=dayStats(ds.send,todayKey()).progress;stickerBurst(pr>=100?'🏆':STICKERS[n%STICKERS.length]);toast(n+'개 미션을 엄마·아빠에게 전송했어요! 🎉'+(pr>=100?' 오늘 미션 올클리어! 🎉':''))}render();return}
  if(ds.cal){var dd=parseKey(calState.cursor);dd.setMonth(dd.getMonth()+Number(ds.cal));calState.cursor=toKey(dd);render();return}
  if(ds.day){calState.selected=ds.day;render();return}
  if(ds.range){dashRange=Number(ds.range);render();return}
  if(ds.adate){approveDate=ds.adate;commentFor=null;render();return}
  if(ds.cmt){commentFor=commentFor===ds.cmt?null:ds.cmt;render();return}

  if(ds.new){editing='new';var t0=todayKey();form={title:'',category:'학습',cycle:'매일',coin:100,startDate:t0,endDate:plusYears(t0,1)};render();return}
  if(ds.edit){var m=S.missions.filter(function(x){return x.id===ds.edit})[0];editing=ds.edit;form={title:m.title,category:m.category,cycle:m.cycle,coin:mCoin(m),startDate:m.startDate,endDate:m.endDate};render();return}
  if(ds.del){var md=S.missions.filter(function(x){return x.id===ds.del})[0];if(confirm('"'+md.title+'" 미션을 삭제할까요?')){deleteMission(ds.del);toast('미션을 삭제했어요')}render();return}

  if(ds.sheetclose){editing=null;render();return}
  if(ds.submit){var ti=document.getElementById('fTitle').value.trim();if(!ti){toast('미션 제목을 입력해주세요');return}form.title=ti;form.startDate=document.getElementById('fStart').value;form.endDate=document.getElementById('fEnd').value;var mcid=route().split('/')[2];var payload={title:form.title,category:form.category,cycle:form.cycle,coin:form.coin,startDate:form.startDate,endDate:form.endDate};if(editing==='new'){addMission({childId:mcid,title:payload.title,category:payload.category,cycle:payload.cycle,coin:payload.coin,startDate:payload.startDate,endDate:payload.endDate});toast('미션을 추가했어요')}else{updateMission(editing,payload);toast('미션을 수정했어요')}editing=null;render();return}

function syncForm(){if(!form)return;var t=document.getElementById('fTitle');if(t)form.title=t.value;var s=document.getElementById('fStart');if(s&&s.value)form.startDate=s.value;var e=document.getElementById('fEnd');if(e&&e.value)form.endDate=e.value}

document.addEventListener('change',function(e){if(e.target.id==='fStart'&&form){var v=e.target.value;if(v){form.startDate=v;form.endDate=plusYears(v,1);var fe=document.getElementById('fEnd');if(fe)fe.value=form.endDate}}});

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.id==='chatInput'){var v=e.target.value.trim();if(v){sendMessage(route().split('/')[2],chatFrom(),v);render()}}});

document.addEventListener('click',function(e){if(e.target.id==='sheetBg'){editing=null;render()}});
/* 다른 탭/기기(같은 브라우저)에서 변경 시 실시간 반영 - 부모·자녀 실시간 대화 */
window.addEventListener('storage',function(e){if(e.key===SKEY){S=load();render();renderOverlay()}});
/* #11 데스크톱 드래그로 미션 순서 변경 (모바일은 ▲▼ 사용) */
document.addEventListener('dragstart',function(e){var row=e.target.closest('[data-drag]');if(row){window._dragId=row.getAttribute('data-drag');try{e.dataTransfer.effectAllowed='move'}catch(x){}}});
document.addEventListener('dragover',function(e){if(e.target.closest('[data-drag]'))e.preventDefault()});

if(!location.hash)location.hash='/child';
/* #7 Supabase 동기화 + 가족 코드 종단간 암호화(E2E)
   - 데이터는 '가족 코드'로 암호화되어 저장 → 코드를 모르면 아무도 해독/열람 불가
   - 코드는 각 기기에만 저장(코드 자체는 서버/코드에 저장 안 됨)
   - 코드 미설정/미지원 환경이면 클라우드 끄고 로컬로만 동작 */
var CLOUD={url:'https://qhulwtunogbpzlbhtvcp.supabase.co',key:'sb_publishable_OliwNHYmloBjvSfZTTPg3A_rsRQ8Z9k',rowId:null,client:null,key2:null,ready:false,applying:false,pushT:null};
var CRYPTO_OK=!!(window.crypto&&window.crypto.subtle);
function familyCode(){try{return localStorage.getItem('hfm_family_code')||''}catch(e){return ''}}
function cloudStatus(){if(!CRYPTO_OK)return '이 환경 미지원(로컬 저장)';if(!familyCode())return '미설정 — 가족 코드를 입력하세요';return CLOUD.ready?'연결됨 🔒 (암호화 동기화)':'연결 중…'}
function _b64(u8){var s='';for(var i=0;i<u8.length;i+=0x8000){s+=String.fromCharCode.apply(null,u8.subarray(i,i+0x8000))}return btoa(s)}
function _unb64(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0)})}
function deriveKey(pass){var enc=new TextEncoder();return crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']).then(function(base){return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('hfm-family-salt-v1'),iterations:100000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])})}
function sha256hex(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(buf){return Array.prototype.map.call(new Uint8Array(buf),function(b){return('0'+b.toString(16)).slice(-2)}).join('')})}
function encJSON(key,obj){var iv=crypto.getRandomValues(new Uint8Array(12));return crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(JSON.stringify(obj))).then(function(ct){var c=new Uint8Array(ct);var out=new Uint8Array(iv.length+c.length);out.set(iv,0);out.set(c,iv.length);return _b64(out)})}
function decJSON(key,b64){var raw=_unb64(b64);var iv=raw.slice(0,12);var ct=raw.slice(12);return crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct).then(function(pt){return JSON.parse(new TextDecoder().decode(pt))})}
function cloudApply(data){if(!data)return;CLOUD.applying=true;S=data;persistLocalOnly();render();renderOverlay();CLOUD.applying=false}
function scheduleCloudPush(now){if(!CLOUD.client||!CLOUD.key2||CLOUD.applying)return;clearTimeout(CLOUD.pushT);CLOUD.pushT=setTimeout(function(){encJSON(CLOUD.key2,S).then(function(enc){return CLOUD.client.from('app_state').upsert({id:CLOUD.rowId,data:{enc:enc},updated_at:new Date().toISOString()})}).then(function(res){if(res&&res.error)console.warn('[cloud push]',res.error.message)}).catch(function(e){console.warn('[cloud push]',e)})},now?150:900)}
function cloudPull(){if(!CLOUD.client||!CLOUD.key2)return Promise.resolve();return CLOUD.client.from('app_state').select('data').eq('id',CLOUD.rowId).maybeSingle().then(function(res){if(res&&res.error){console.warn('[cloud pull]',res.error.message);return}var row=res&&res.data;if(row&&row.data&&row.data.enc){return decJSON(CLOUD.key2,row.data.enc).then(function(obj){CLOUD.ready=true;cloudApply(obj)}).catch(function(){console.warn('[cloud] 복호화 실패 - 가족 코드가 다릅니다')})}else{scheduleCloudPush(true)}}).catch(function(e){console.warn('[cloud pull]',e)})}
function cloudInit(){var code=familyCode();if(CLOUD.client||!window.supabase||!CRYPTO_OK||!code)return;try{Promise.all([deriveKey(code),sha256hex(code)]).then(function(r){CLOUD.key2=r[0];CLOUD.rowId='fam_'+r[1].slice(0,40);CLOUD.client=window.supabase.createClient(CLOUD.url,CLOUD.key);return cloudPull().then(function(){CLOUD.client.channel('hfm-'+CLOUD.rowId).on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:'id=eq.'+CLOUD.rowId},function(p){if(CLOUD.applying)return;var e=p&&p.new&&p.new.data&&p.new.data.enc;if(e)decJSON(CLOUD.key2,e).then(cloudApply).catch(function(){})}).subscribe(function(st){if(st==='SUBSCRIBED'){CLOUD.ready=true;if(document.getElementById('cloudStat'))render()}})})}).catch(function(e){console.warn('[cloud init]',e)})}catch(e){console.warn('[cloud init]',e)}}
function setFamilyCode(code){try{if(code)localStorage.setItem('hfm_family_code',code);else localStorage.removeItem('hfm_family_code')}catch(e){}CLOUD.client=null;CLOUD.ready=false;CLOUD.key2=null;CLOUD.rowId=null;if(code)cloudInit()}
window.addEventListener('load',cloudInit);
